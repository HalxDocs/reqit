name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: flux/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: flux/frontend
        run: npm install --include=dev

      - name: Build (Windows/amd64)
        working-directory: flux
        run: wails build -platform windows/amd64 -o reqit -ldflags "-X 'flux/internal/updater.CurrentVersion=${{ github.ref_name }}'"

      - name: Copy artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ -f "flux/build/bin/reqit.exe" ]; then
            cp "flux/build/bin/reqit.exe" "release-artifacts/reqit-windows-amd64.exe"
          else
            cp "flux/build/bin/reqit" "release-artifacts/reqit-windows-amd64.exe"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: release-artifacts/

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: flux/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: flux/frontend
        run: npm install --include=dev

      - name: Build (macOS universal)
        working-directory: flux
        run: wails build -platform darwin/universal -o reqit -ldflags "-X 'flux/internal/updater.CurrentVersion=${{ github.ref_name }}'"

      - name: Package as zip
        run: |
          mkdir -p release-artifacts
          cd flux/build/bin
          zip -r "../../../release-artifacts/reqit-macos-universal.zip" reqit.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: release-artifacts/

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: flux/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: flux/frontend
        run: npm install --include=dev

      - name: Build (Linux/amd64)
        working-directory: flux
        run: wails build -platform linux/amd64 -o reqit -tags webkit2_41 -ldflags "-X 'flux/internal/updater.CurrentVersion=${{ github.ref_name }}'"

      - name: Copy artifact
        run: |
          mkdir -p release-artifacts
          cp flux/build/bin/reqit release-artifacts/reqit-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release-artifacts

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          cd release-artifacts
          echo "win_sha=$(sha256sum reqit-windows-amd64.exe | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "mac_sha=$(sha256sum reqit-macos-universal.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$(sha256sum reqit-linux-amd64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json manifest
        run: |
          TAG="${{ github.ref_name }}"
          cat > release-artifacts/latest.json <<EOF
          {
            "version": "${TAG}",
            "notes": "See release notes at https://github.com/HalxDocs/reqit/releases/tag/${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-amd64": {
                "url": "https://github.com/HalxDocs/reqit/releases/download/${TAG}/reqit-windows-amd64.exe",
                "sha256": "${{ steps.checksums.outputs.win_sha }}"
              },
              "darwin-universal": {
                "url": "https://github.com/HalxDocs/reqit/releases/download/${TAG}/reqit-macos-universal.zip",
                "sha256": "${{ steps.checksums.outputs.mac_sha }}"
              },
              "linux-amd64": {
                "url": "https://github.com/HalxDocs/reqit/releases/download/${TAG}/reqit-linux-amd64",
                "sha256": "${{ steps.checksums.outputs.linux_sha }}"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**
