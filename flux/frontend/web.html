                    "@type": "Answer",
                    "text": "reqit (reqit API Client) is a free, open-source, local-first desktop API client by HalxDocs. It supports HTTP, WebSocket, SSE, Socket.IO, GraphQL, gRPC, SOAP, and MQTT. Collections are stored as plain JSON files in a .reqit/ directory that you commit to Git. No account required, no cloud dependency, no telemetry."

                "name": "How is reqit different from Postman?",

                    "@type": "Answer",

                }
