name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: macos-13
            platform: darwin-amd64
          - os: macos-latest
            platform: darwin-arm64
          - os: windows-latest
            platform: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: dAppServer/wails-build-action@v2
        with:
          build-name: reqit
          build-platform: ${{ matrix.platform }}
          ldflags: -X 'flux/internal/updater.CurrentVersion=${{ github.ref_name }}'
      - name: Generate checksum
        shell: bash
        run: |
          cd build/bin
          sha256sum * >> SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/*
            build/bin/SHA256SUMS.txt

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate latest.json
        run: python3 scripts/gen_manifest.py ${{ github.ref_name }} > latest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: latest.json
